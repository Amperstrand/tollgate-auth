# Caddy config for cashu.email ecosystem
# Deploy: copy to /etc/caddy/sites-available/ and symlink to sites-enabled/
# Or append to main Caddyfile

# ── ssh.cashu.email — Browser SSH demo ──────────────────────────
# WebSocket-to-SSH bridge, serves the xterm.js terminal demo
ssh.cashu.email {
	reverse_proxy localhost:8092 {
		# WebSocket support — flush immediately for real-time terminal
		flush_interval -1
	}
}

# ── faucet.cashu.email — Testnut token faucet ───────────────────
# Static page that mints free test Cashu tokens from multiple test mints
faucet.cashu.email {
	root * /opt/cashu-tollgate/faucet
	file_server
	try_files {path} /index.html
}
