# Caddy config for tollgate-auth-ocpi — OCPI 2.2.1 eMSP receiver + dashboard.
#
# Deploy (on the VPS):
#   sudo cp config/caddy/ocpi.conf /etc/caddy/sites-available/ocpi.conf
#   sudo ln -sf ../sites-available/ocpi.conf /etc/caddy/sites-enabled/ocpi.conf
#   sudo systemctl reload caddy
#
# DNS prerequisite: ocpi.nodns.shop must resolve to the VPS. If using Cloudflare
# DNS, add an A record (proxied or unproxied both work; Caddy obtains certs via
# HTTP-01 or Cloudflare DNS-01 challenge automatically).

ocpi.nodns.shop {
	# OCPI server runs on :8093. Reverse-proxy everything.
	reverse_proxy localhost:8093 {
		# OCPI async command callbacks use POST with no body sometimes —
		# flush immediately so peers don't deadlock waiting for ack.
		flush_interval -1
	}

	# OCPI is mostly JSON; compress for smaller CDR/location payloads.
	encode zstd gzip

	# Basic security headers.
	header {
		X-Content-Type-Options nosniff
		X-Frame-Options DENY
		Referrer-Policy no-referrer
		# CSP allows the dashboard's HTMX script from unpkg.
		Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://unpkg.com; style-src 'self' 'unsafe-inline'; connect-src 'self'; img-src 'self' data:; frame-ancestors 'none';"
	}

	# Access log for protocol debugging — useful during OCPPLab onboarding.
	log {
		output file /var/log/caddy/ocpi-access.log {
			roll_size 100mb
			roll_keep 5
		}
		format json
	}

	# Request size cap: CDRs and sessions are <32KB in practice; cap at 1MB
	# to reject accidental/malicious large uploads.
	request_body {
		max_size 1MB
	}
}
