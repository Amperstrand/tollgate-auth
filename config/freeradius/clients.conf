# /etc/freeradius/3.0/clients.conf
# Configure NAS devices (WiFi APs, switches) that send RADIUS requests.

# Plain RADIUS (UDP 1812) — shared secret auth
client all_clients {
    ipaddr = 0.0.0.0/0
    secret = tollgate
}

# RadSec (TCP 2083) — TLS mutual auth, secret is convention ("radsec")
client radsec_clients {
    ipaddr = 0.0.0.0/0
    proto = tcp
    secret = radsec
}

