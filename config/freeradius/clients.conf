# /etc/freeradius/3.0/clients.conf
# Configure NAS devices (WiFi APs, switches) that send RADIUS requests.

# Allow any client for testing (restrict in production)
client all_clients {
    ipaddr = 0.0.0.0/0
    secret = tollgate
}

