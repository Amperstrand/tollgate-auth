name: E2E Demo

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build & Vet
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Vet
        run: go vet ./...

      - name: Build SSH binary
        run: CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -o /tmp/tollgate-auth-ssh ./cmd/tollgate-auth-ssh/

      - name: Build RADIUS binary
        run: CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -o /tmp/tollgate-auth-radius ./cmd/tollgate-auth-radius/

  e2e-radius:
    name: Live RADIUS E2E
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Install tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq freeradius-utils socat

      - name: Generate unique test suffix
        run: |
          echo "RUNID=${GITHUB_RUN_ID}" >> "$GITHUB_ENV"
          echo "Test suffix: $GITHUB_RUN_ID"

      # ─── Test 1: Fresh lnurlw → Accept + Reply-Message ───
      - name: Test 1 — Fresh lnurlw → Accept with Reply-Message
        run: |
          CODE="lnurlw1cifresh${RUNID}kx2ar0veekzar0wd5xjtnrdakj7ci"
          echo "Using code: ${CODE:0:30}..."
          echo "User-Name = \"$CODE\"
          User-Password = \"anything\"
          NAS-IP-Address = 10.0.0.1
          Calling-Station-Id = \"aa-00-11-22-$RUNID\"
          NAS-Port = 0" | radclient -x nodns.shop auth tollgate 2>&1 | tee /tmp/test1.log
          grep -q "Access-Accept" /tmp/test1.log || { echo "FAIL: Expected Access-Accept"; exit 1; }
          grep -q "Reply-Message" /tmp/test1.log || { echo "FAIL: Expected Reply-Message"; exit 1; }
          echo "Reply-Message: $(grep Reply-Message /tmp/test1.log)"

      # ─── Test 2: Replay same code with different MAC → Reject ───
      - name: Test 2 — Replay same code (different MAC) → Reject
        run: |
          CODE="lnurlw1cifresh${RUNID}kx2ar0veekzar0wd5xjtnrdakj7ci"
          echo "User-Name = \"$CODE\"
          User-Password = \"anything\"
          NAS-IP-Address = 10.0.0.1
          Calling-Station-Id = \"bb-00-22-33-$RUNID\"
          NAS-Port = 0" | radclient -x nodns.shop auth tollgate 2>&1 | tee /tmp/test2.log
          grep -q "Access-Reject" /tmp/test2.log || { echo "FAIL: Expected Access-Reject for replay"; exit 1; }

      # ─── Test 3: Same MAC, different code → Accept (session reconnection) ───
      - name: Test 3 — Same MAC, different code → Accept (reconnection)
        run: |
          CODE="lnurlw1cidiffcode${RUNID}kx2ar0veekzar0wd5xjtnrdakj7ci"
          echo "User-Name = \"$CODE\"
          User-Password = \"anything\"
          NAS-IP-Address = 10.0.0.1
          Calling-Station-Id = \"aa-00-11-22-$RUNID\"
          NAS-Port = 0" | radclient -x nodns.shop auth tollgate 2>&1 | tee /tmp/test3.log
          grep -q "Access-Accept" /tmp/test3.log || { echo "FAIL: Expected Access-Accept for reconnection"; exit 1; }

      # ─── Test 4: lnurlw in password field → Accept ───
      - name: Test 4 — lnurlw in password field → Accept
        run: |
          CODE="lnurlw1cipassfield${RUNID}kx2ar0veekzar0wd5xjtnrdakj7ci"
          echo "User-Name = \"ci-user\"
          User-Password = \"$CODE\"
          NAS-IP-Address = 10.0.0.1
          Calling-Station-Id = \"cc-00-33-44-$RUNID\"
          NAS-Port = 0" | radclient -x nodns.shop auth tollgate 2>&1 | tee /tmp/test4.log
          grep -q "Access-Accept" /tmp/test4.log || { echo "FAIL: Expected Access-Accept for lnurlw in password"; exit 1; }

      # ─── Test 5: Uppercase LNURLW → Accept ───
      - name: Test 5 — Uppercase LNURLW → Accept
        run: |
          CODE="LNURLW1CIUPPERCASE${RUNID}KX2AR0VEEKZAR0WD5XJTNRDAKJ7CI"
          echo "User-Name = \"$CODE\"
          User-Password = \"anything\"
          NAS-IP-Address = 10.0.0.1
          Calling-Station-Id = \"dd-00-44-55-$RUNID\"
          NAS-Port = 0" | radclient -x nodns.shop auth tollgate 2>&1 | tee /tmp/test5.log
          grep -q "Access-Accept" /tmp/test5.log || { echo "FAIL: Expected Access-Accept for uppercase LNURLW"; exit 1; }

      # ─── Test 6: Invalid credentials → Reject ───
      - name: Test 6 — Invalid credentials → Reject
        run: |
          echo "User-Name = \"not-a-token\"
          User-Password = \"bad-password\"
          NAS-IP-Address = 10.0.0.1
          Calling-Station-Id = \"ee-00-55-66-$RUNID\"
          NAS-Port = 0" | radclient -x nodns.shop auth tollgate 2>&1 | tee /tmp/test6.log
          grep -q "Access-Reject" /tmp/test6.log || { echo "FAIL: Expected Access-Reject for invalid creds"; exit 1; }

      - name: Cache eapol_test binary
        id: cache-eapol
        uses: actions/cache@v4
        with:
          path: /usr/local/bin/eapol_test
          key: eapol-test-ubuntu2404-v1

      - name: Build eapol_test (cache miss)
        if: steps.cache-eapol.outputs.cache-hit != 'true'
        run: |
          sudo sed -i '/^Types:/s/deb$/deb deb-src/' /etc/apt/sources.list.d/ubuntu.sources 2>/dev/null || true
          sudo apt-get update -qq 2>/dev/null
          sudo apt-get build-dep -y -qq wpasupplicant 2>/dev/null || \
            sudo apt-get install -y -qq libssl-dev libnl-3-dev libnl-genl-3-dev pkg-config libdbus-1-dev 2>/dev/null
          mkdir -p /tmp/eapol-build && cd /tmp/eapol-build
          apt-get source --quiet wpasupplicant 2>/dev/null
          cd wpa-*/wpa_supplicant
          cp defconfig .config
          echo "CONFIG_EAPOL_TEST=y" >> .config
          echo "CFLAGS += -Wno-deprecated-declarations" >> .config
          make -j$(nproc) eapol_test 2>&1 | tail -10
          sudo cp eapol_test /usr/local/bin/

      - name: Cache npm deps
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: npm-cashu-ts-${{ hashFiles('scripts/mint-testnut.js') }}
          restore-keys: npm-cashu-ts-

      - name: Resolve RADIUS server IP
        run: echo "RADIUS_IP=$(dig +short nodns.shop A | head -1)" >> "$GITHUB_ENV"

      - name: Install npm deps
        run: npm install --no-package-lock @cashu/cashu-ts@4.5.1 2>&1 | tail -1

      # ─── Test 7: Cashu token via EAP-TTLS+PAP (no-DLEQ, password-only) → Access-Accept ───
      # No-DLEQ tokens are 230 bytes — fits in a single RADIUS attribute (under 253-byte limit).
      # Token goes entirely in the password field. This is the simplest and most practical mode.
      - name: Test 7 — Cashu no-DLEQ token in password → Access-Accept
        run: |
          echo "eapol_test: $(which eapol_test)"

          TOKEN=$(node scripts/mint-testnut.js --no-dleq --write-eapol-config /tmp/eapol7.conf 2>/tmp/mint7.log)
          if [ -z "$TOKEN" ]; then
            echo "FAIL: Could not mint Cashu token"
            cat /tmp/mint7.log
            exit 1
          fi
          echo "Minted: ${TOKEN:0:40}... (${#TOKEN} bytes)"

          # Verify token fits in single field
          if [ ${#TOKEN} -gt 253 ]; then
            echo "FAIL: No-DLEQ token is ${#TOKEN} bytes, expected <= 253"
            exit 1
          fi

          echo "--- EAP-TTLS+PAP (password-only) against ${RADIUS_IP}:1812 ---"
          eapol_test -c /tmp/eapol7.conf -a "$RADIUS_IP" -s tollgate \
            -M ff:00:77:88:99:aa -r 1 -t 30 2>&1 | tee /tmp/eapol7.log

          grep -q "Access-Accept" /tmp/eapol7.log || { echo "FAIL: Expected Access-Accept for no-DLEQ token in password"; cat /tmp/eapol7.log; exit 1; }
          echo "SUCCESS: No-DLEQ Cashu token (password-only) validated via EAP-TTLS+PAP"

      # ─── Test 8: Cashu no-DLEQ token in username/identity → Access-Accept ───
      # Same 230-byte no-DLEQ token, but in the identity (username) field instead of password.
      # Tests the "token in username" path in extractPayment().
      - name: Test 8 — Cashu no-DLEQ token in username → Access-Accept
        run: |
          TOKEN=$(node scripts/mint-testnut.js --no-dleq --token-in-username --write-eapol-config /tmp/eapol8.conf 2>/tmp/mint8.log)
          if [ -z "$TOKEN" ]; then
            echo "FAIL: Could not mint Cashu token"
            cat /tmp/mint8.log
            exit 1
          fi
          echo "Minted: ${TOKEN:0:40}... (${#TOKEN} bytes)"

          echo "--- EAP-TTLS+PAP (identity-only) against ${RADIUS_IP}:1812 ---"
          eapol_test -c /tmp/eapol8.conf -a "$RADIUS_IP" -s tollgate \
            -M ff:33:aa:bb:cc:dd -r 1 -t 30 2>&1 | tee /tmp/eapol8.log

          grep -q "Access-Accept" /tmp/eapol8.log || { echo "FAIL: Expected Access-Accept for no-DLEQ token in username"; cat /tmp/eapol8.log; exit 1; }
          echo "SUCCESS: No-DLEQ Cashu token (identity-only) validated via EAP-TTLS+PAP"

      # ─── Test 9: Cashu split token via EAP-TTLS+PAP → Access-Accept ───
      # Full 378-byte token with DLEQ proof exceeds 253-byte limit.
      # Split at byte 200: password gets first 200b (with cashuB prefix), identity gets 178b tail.
      # Go binary detects and reassembles. Tests the split-token fallback path.
      - name: Test 9 — Cashu split token (with DLEQ) → Access-Accept
        run: |
          TOKEN=$(node scripts/mint-testnut.js --write-eapol-config /tmp/eapol9.conf --eap-identity ci-split-user 2>/tmp/mint9.log)
          if [ -z "$TOKEN" ]; then
            echo "FAIL: Could not mint Cashu token"
            cat /tmp/mint9.log
            exit 1
          fi
          echo "Minted: ${TOKEN:0:40}... (${#TOKEN} bytes)"

          # Verify this is a full DLEQ token (should be > 253)
          if [ ${#TOKEN} -le 253 ]; then
            echo "FAIL: Expected full DLEQ token > 253 bytes, got ${#TOKEN}"
            exit 1
          fi

          echo "--- EAP-TTLS+PAP (split) against ${RADIUS_IP}:1812 ---"
          eapol_test -c /tmp/eapol9.conf -a "$RADIUS_IP" -s tollgate \
            -M ff:44:bb:cc:dd:ee -r 1 -t 30 2>&1 | tee /tmp/eapol9.log

          grep -q "Access-Accept" /tmp/eapol9.log || { echo "FAIL: Expected Access-Accept for split Cashu token"; cat /tmp/eapol9.log; exit 1; }
          echo "SUCCESS: Split Cashu token (with DLEQ) validated via EAP-TTLS+PAP"

      # ─── Test 10: Cashu token replay → Accept then Reject ───
      # Verifies replay protection: same no-DLEQ token used twice = second attempt rejected.
      # Uses a DIFFERENT MAC for the replay to avoid session-reconnection path.
      - name: Test 10 — Cashu no-DLEQ token replay → Accept then Reject
        run: |
          TOKEN=$(node scripts/mint-testnut.js --no-dleq --write-eapol-config /tmp/eapol10a.conf 2>/tmp/mint10.log)
          if [ -z "$TOKEN" ]; then
            echo "FAIL: Could not mint Cashu token"
            cat /tmp/mint10.log
            exit 1
          fi
          echo "Minted: ${TOKEN:0:40}... (${#TOKEN} bytes)"

          echo "--- First use (expect Accept) ---"
          eapol_test -c /tmp/eapol10a.conf -a "$RADIUS_IP" -s tollgate \
            -M ff:55:cc:dd:ee:f0 -r 1 -t 30 2>&1 | tee /tmp/eapol10a.log
          grep -q "Access-Accept" /tmp/eapol10a.log || { echo "FAIL: First use should Accept"; exit 1; }

          node scripts/mint-testnut.js --token "$TOKEN" --write-eapol-config /tmp/eapol10b.conf

          sleep 5

          echo "--- Replay (expect Reject) ---"
          eapol_test -c /tmp/eapol10b.conf -a "$RADIUS_IP" -s tollgate \
            -M ff:66:dd:ee:ff:00 -r 1 -t 30 2>&1 | tee /tmp/eapol10b.log
          grep -q "Access-Reject" /tmp/eapol10b.log || { echo "FAIL: Replay should Reject"; exit 1; }
          echo "SUCCESS: Replay protection working"

      # ─── Test 11: RadSec TLS certificate validation ───
      # Verifies the Let's Encrypt certificate served on port 2083:
      # - Valid chain (issuer = Let's Encrypt)
      # - CN/SAN = nodns.shop
      # - Not expired
      # - TLS 1.2+ with strong cipher
      - name: Test 11 — RadSec TLS certificate validation
        run: |
          echo "--- TLS handshake to nodns.shop:2083 ---"
          CERT_INFO=$(echo | openssl s_client -connect nodns.shop:2083 -servername nodns.shop 2>/dev/null)

          echo "$CERT_INFO" | grep -q "Verify return code: 0 (ok)" \
            || { echo "FAIL: Certificate verification failed"; echo "$CERT_INFO"; exit 1; }

          # Parse cert details
          CERT_TEXT=$(echo "$CERT_INFO" | openssl x509 -text -noout 2>/dev/null)

          # Check issuer is Let's Encrypt
          echo "$CERT_TEXT" | grep -qi "Issuer:.*Let's Encrypt" \
            || { echo "FAIL: Issuer is not Let's Encrypt"; echo "$CERT_TEXT" | grep "Issuer:"; exit 1; }

          # Check subject CN = nodns.shop
          echo "$CERT_TEXT" | grep -q "Subject:.*CN = nodns.shop" \
            || { echo "FAIL: Subject CN is not nodns.shop"; echo "$CERT_TEXT" | grep "Subject:"; exit 1; }

          # Check SAN includes nodns.shop
          echo "$CERT_TEXT" | grep -q "DNS:nodns.shop" \
            || { echo "FAIL: SAN does not include nodns.shop"; exit 1; }

          # Check TLS 1.2 or 1.3 (handle both OpenSSL 1.x "Protocol  :" and 3.x formats)
          PROTO=$(echo "$CERT_INFO" | grep -oiE "TLSv[0-9.]+" | head -1)
          echo "TLS Protocol: $PROTO"
          if [ "$PROTO" != "TLSv1.2" ] && [ "$PROTO" != "TLSv1.3" ]; then
            echo "FAIL: Expected TLSv1.2 or TLSv1.3, got $PROTO"
            exit 1
          fi

          # Check cipher is strong (AES-GCM or CHACHA)
          CIPHER=$(echo "$CERT_INFO" | grep -oiE "TLS_[A-Z_0-9]+" | head -1)
          echo "Cipher: $CIPHER"
          echo "$CIPHER" | grep -qiE "GCM|CHACHA|AES" \
            || { echo "FAIL: Weak cipher: $CIPHER"; exit 1; }

          echo "SUCCESS: RadSec TLS certificate valid (LE, nodns.shop, $PROTO, $CIPHER)"

      # ─── Test 12: RadSec RADIUS over TLS with cert verification ───
      # Same as old Test 11 but verifies the LE cert chain instead of verify=0.
      # Uses socat with the system CA bundle to validate the server certificate.
      - name: Test 12 — RadSec RADIUS over TLS (verified cert) → Accept
        run: |
          # Create local TLS tunnel to RadSec port WITH cert verification
          socat TCP-LISTEN:11812,reuseaddr,fork SSL:nodns.shop:2083,verify=1,cafile=/etc/ssl/certs/ca-certificates.crt &
          SOCAT_PID=$!
          sleep 1

          echo 'User-Name = "lnurlw1ciradsectest'"$RUNID"'kx2ar0veekzar0wd5xjtnrdakj7ci"
          User-Password = "anything"
          NAS-IP-Address = 10.0.0.1
          Calling-Station-Id = "ff-44-66-77-'"$RUNID"'"
          NAS-Port = 0' | radclient -x -P tcp -r 1 -t 5 127.0.0.1:11812 auth radsec 2>&1 | tee /tmp/test12.log

          kill $SOCAT_PID 2>/dev/null

          grep -q "Access-Accept" /tmp/test12.log || { echo "FAIL: Expected Access-Accept via RadSec with cert verification"; exit 1; }
          echo "SUCCESS: RadSec accepted with verified Let's Encrypt certificate"

      # ─── Test 13: RadSec with eapol_test (full EAP-TTLS over TLS) ───
      # KNOWN LIMITATION: eapol_test uses UDP RADIUS transport only (hostapd's
      # RADIUS client). RadSec (RFC 6613) requires TCP+TLS with a 4-byte Length
      # prefix that UDP RADIUS doesn't have. A socat TCP-LISTEN→SSL bridge can't
      # work because eapol_test sends UDP packets to a TCP port.
      #
      # eapol_test has no native TLS/TCP support. To test EAP-TTLS+PAP with
      # payment tokens, use Test 7-10 (eapol_test over plain UDP RADIUS).
      # RadSec transport is validated separately by Test 12 (radclient -P tcp).
      #
      # This step is non-blocking (continue-on-error). If a future version of
      # eapol_test adds RadSec support, remove continue-on-error and the exit 0.
      - name: Test 13 — RadSec eapol_test (known limitation, non-blocking)
        continue-on-error: true
        run: |
          echo "KNOWN LIMITATION: eapol_test cannot test RadSec (UDP-only, no TLS support)"
          echo "RadSec transport is validated by Test 12 (radclient -P tcp over socat TLS bridge)"
          echo "EAP-TTLS+PAP with payment tokens is validated by Tests 7-10 (plain UDP RADIUS)"
          echo ""
          echo "Skipping Test 13 — see docs/known-unknowns.md for details"
          exit 0

      # ─── Test 14: SSH tollgate responds on port 2222 ───
      - name: Test 14 — SSH tollgate responds on port 2222
        run: |
          timeout 5 bash -c 'echo | nc nodns.shop 2222' 2>/dev/null | head -1 | grep -q "SSH" \
            || { echo "FAIL: SSH tollgate not responding on port 2222"; exit 1; }

      # ─── Test 15: Session-Timeout accuracy (parse value from Accept) ───
      # Verifies Session-Timeout = amount × RateSecPerSat.
      # Uses a fresh lnurlw (3600s default) and checks the returned value.
      - name: Test 15 — Session-Timeout accuracy
        run: |
          CODE="lnurlw1citimeouttest${RUNID}kx2ar0veekzar0wd5xjtnrdakj7ci"
          echo "User-Name = \"$CODE\"
          User-Password = \"anything\"
          NAS-IP-Address = 10.0.0.1
          Calling-Station-Id = \"aa:bb:15:$RUNID\"
          NAS-Port = 0" | radclient -x nodns.shop auth tollgate 2>&1 | tee /tmp/test15.log
          grep -q "Access-Accept" /tmp/test15.log || { echo "FAIL: Expected Access-Accept"; exit 1; }
          ST=$(grep "Session-Timeout" /tmp/test15.log | grep -oE '[0-9]+' | head -1)
          if [ -z "$ST" ]; then
            echo "FAIL: No Session-Timeout in response"
            exit 1
          fi
          echo "Session-Timeout = $ST"
          if [ "$ST" -ne 3600 ]; then
            echo "FAIL: Expected Session-Timeout=3600 (LNURLW default), got $ST"
            exit 1
          fi
          echo "SUCCESS: Session-Timeout is correct ($ST)"

      # ─── Test 16: Delegated Cashu token → Accept with delegated mode ───
      - name: Test 16 — Delegated Cashu token validation
        run: |
          TOKEN=$(node scripts/mint-testnut.js --no-dleq 4 2>/tmp/mint14.log)
          if [ -z "$TOKEN" ]; then
            echo "FAIL: Could not mint Cashu token"
            cat /tmp/mint14.log
            exit 1
          fi
          echo "Minted 4-sat token (${#TOKEN} bytes)"

          echo "User-Name = \"ci-delegated-16\"
          User-Password = \"$TOKEN\"
          NAS-IP-Address = 10.0.0.1
          Calling-Station-Id = \"aa:bb:16:$RUNID\"
          NAS-Port = 0" | radclient -x nodns.shop auth tollgate 2>&1 | tee /tmp/test16.log

          # Verify Access-Accept
          grep -q "Access-Accept" /tmp/test16.log || { echo "FAIL: Expected Access-Accept"; cat /tmp/test16.log; exit 1; }

          # Verify Reply-Message shows delegated mode (enriched "s/sat" or fallback "delegated")
          grep -q "s/sat" /tmp/test16.log || grep -qi "delegated" /tmp/test16.log || { echo "FAIL: Reply-Message should show delegated mode (enriched or fallback)"; cat /tmp/test16.log; exit 1; }

          # Verify Session-Timeout is present and > 0
          ST=$(grep "Session-Timeout" /tmp/test16.log | grep -oE '[0-9]+' | head -1)
          if [ -z "$ST" ]; then
            echo "FAIL: No Session-Timeout in response"
            cat /tmp/test16.log
            exit 1
          fi
          if [ "$ST" -le 0 ]; then
            echo "FAIL: Session-Timeout must be > 0, got $ST"
            exit 1
          fi
          echo "Session-Timeout = $ST (positive value confirmed)"

          # If enriched format is present, verify it contains "sat" (transparency info)
          if grep -q "Valid Cashu token" /tmp/test16.log; then
            grep -q "sat" /tmp/test16.log || { echo "FAIL: Enriched format missing 'sat'"; cat /tmp/test16.log; exit 1; }
          fi

          echo "SUCCESS: Delegated auth accepted (Access-Accept + Reply-Message + Session-Timeout=$ST)"

      # ─── Test 17: RADIUS accounting (Acct-Start + Acct-Stop) ───
      - name: Test 17 — RADIUS accounting (Start + Stop)
        run: |
          echo 'Acct-Status-Type = Start
          User-Name = "ci-acct-user"
          NAS-IP-Address = 10.0.0.1
          Calling-Station-Id = "aa:bb:17:'"$RUNID"'"
          Acct-Session-Id = "ci-session-'"$RUNID"'"
          NAS-Port = 0' | radclient -x nodns.shop acct tollgate 2>&1 | tee /tmp/acct-start.log
          grep -q "Accounting-Response" /tmp/acct-start.log || { echo "FAIL: No Accounting-Response for Start"; exit 1; }
          echo "Acct-Start: OK"

          echo 'Acct-Status-Type = Stop
          User-Name = "ci-acct-user"
          NAS-IP-Address = 10.0.0.1
          Calling-Station-Id = "aa:bb:17:'"$RUNID"'"
          Acct-Session-Id = "ci-session-'"$RUNID"'"
          Acct-Session-Time = 300
          Acct-Input-Octets = 1024
          Acct-Output-Octets = 2048
          NAS-Port = 0' | radclient -x nodns.shop acct tollgate 2>&1 | tee /tmp/acct-stop.log
          grep -q "Accounting-Response" /tmp/acct-stop.log || { echo "FAIL: No Accounting-Response for Stop"; exit 1; }
          echo "Acct-Stop: OK"
          echo "SUCCESS: Accounting Start + Stop both acknowledged"

      # ─── Test 18: Concurrent sessions (parallel auth with different MACs) ───
      - name: Test 18 — Concurrent sessions (parallel auth)
        run: |
          CODE1="lnurlw1ciconc1${RUNID}kx2ar0veekzar0wd5xjtnrdakj7ci"
          CODE2="lnurlw1ciconc2${RUNID}kx2ar0veekzar0wd5xjtnrdakj7ci"
          echo "User-Name = \"$CODE1\"
          User-Password = \"anything\"
          NAS-IP-Address = 10.0.0.1
          Calling-Station-Id = \"aa:bb:18:$RUNID\"
          NAS-Port = 0" | radclient -x -r 1 -t 10 nodns.shop auth tollgate > /tmp/conc1.log 2>&1 &

          echo "User-Name = \"$CODE2\"
          User-Password = \"anything\"
          NAS-IP-Address = 10.0.0.1
          Calling-Station-Id = \"aa:bb:19:$RUNID\"
          NAS-Port = 0" | radclient -x -r 1 -t 10 nodns.shop auth tollgate > /tmp/conc2.log 2>&1 &

          wait
          echo "--- Concurrent session 1 ---"
          cat /tmp/conc1.log
          echo "--- Concurrent session 2 ---"
          cat /tmp/conc2.log

          grep -q "Access-Accept" /tmp/conc1.log || { echo "FAIL: Concurrent session 1 not accepted"; exit 1; }
          grep -q "Access-Accept" /tmp/conc2.log || { echo "FAIL: Concurrent session 2 not accepted"; exit 1; }
          echo "SUCCESS: Both concurrent sessions accepted"

      # ═══════════════════════════════════════════════════════════════════
      # Delegated Mode Tests (production v1 server on nodns.shop)
      # These test the full delegated pipeline:
      #   radclient → FreeRADIUS → tollgate-auth-radius (delegated mode)
      #   → POST / to v1 server (tollgate-net:2121) → CDK wallet swap
      #   → Access-Accept with Session-Timeout
      # ═══════════════════════════════════════════════════════════════════

      # ─── Test D1: Delegated fresh auth with real Cashu token ───
      - name: "Test D1 - Delegated fresh auth"
        run: |
          TOKEN=$(node scripts/mint-testnut.js --no-dleq 8 2>/tmp/mint-d1.log)
          if [ -z "$TOKEN" ]; then echo "FAIL: Could not mint token"; cat /tmp/mint-d1.log; exit 1; fi
          echo "Minted: ${TOKEN:0:40}... (${#TOKEN} bytes)"

          echo "User-Name = \"ci-delegated\"
          User-Password = \"$TOKEN\"
          NAS-IP-Address = 10.0.0.1
          Calling-Station-Id = \"dd-00-d1-$RUNID\"" | radclient -x -r 1 -t 15 nodns.shop auth tollgate 2>&1 | tee /tmp/delegated-d1.log

          grep -q "Access-Accept" /tmp/delegated-d1.log || { echo "FAIL: Expected Access-Accept for delegated fresh auth"; exit 1; }
          ST=$(grep "Session-Timeout" /tmp/delegated-d1.log | grep -oE '[0-9]+' | head -1)
          echo "Session-Timeout = $ST"
          if [ -z "$ST" ] || [ "$ST" -lt 400 ]; then
            echo "FAIL: Expected Session-Timeout >= 400 (7+ min after fee), got $ST"
            exit 1
          fi
          echo "SUCCESS: Delegated fresh auth accepted (Session-Timeout=$ST)"

      # ─── Test D2: Delegated reconnection (same MAC + same token) ───
      - name: "Test D2 - Delegated reconnection"
        run: |
          # Re-send the same token+MAC — Go binary should find the local session and resume
          TOKEN=$(node scripts/mint-testnut.js --no-dleq 8 2>/tmp/mint-d2a.log)
          if [ -z "$TOKEN" ]; then echo "FAIL: Could not mint token"; exit 1; fi

          echo "User-Name = \"ci-delegated\"
          User-Password = \"$TOKEN\"
          NAS-IP-Address = 10.0.0.1
          Calling-Station-Id = \"dd-00-d2-$RUNID\"" | radclient -x -r 1 -t 15 nodns.shop auth tollgate 2>&1 | tee /tmp/delegated-d2a.log

          grep -q "Access-Accept" /tmp/delegated-d2a.log || { echo "FAIL: First auth should Accept"; exit 1; }
          ST1=$(grep "Session-Timeout" /tmp/delegated-d2a.log | grep -oE '[0-9]+' | head -1)
          echo "First auth: Session-Timeout = $ST1"

          sleep 2

          echo "User-Name = \"ci-delegated\"
          User-Password = \"$TOKEN\"
          NAS-IP-Address = 10.0.0.1
          Calling-Station-Id = \"dd-00-d2-$RUNID\"" | radclient -x -r 1 -t 15 nodns.shop auth tollgate 2>&1 | tee /tmp/delegated-d2b.log

          grep -q "Access-Accept" /tmp/delegated-d2b.log || { echo "FAIL: Reconnection should Accept"; exit 1; }
          ST2=$(grep "Session-Timeout" /tmp/delegated-d2b.log | grep -oE '[0-9]+' | head -1)
          echo "Reconnection: Session-Timeout = $ST2"

          # Reconnection should have slightly less time (consumed between requests)
          if [ -z "$ST2" ] || [ "$ST2" -ge "$ST1" ]; then
            echo "FAIL: Expected reconnection Session-Timeout < first ($ST2 >= $ST1)"
            exit 1
          fi

          grep -q "Session resumed" /tmp/delegated-d2b.log || { echo "FAIL: Expected 'Session resumed' in Reply-Message"; exit 1; }
          echo "SUCCESS: Delegated reconnection works (first=$ST1, resumed=$ST2)"

      # ─── Test D3: Delegated SSH with real Cashu token ───
      # The chroot BusyBox shell is interactive — it swallows commands passed via
      # ssh args. Instead we grep for the CASHU TOLLGATE banner which proves the
      # token was accepted, guest user created, and shell granted.
      - name: "Test D3 - Delegated SSH auth on port 2222"
        run: |
          TOKEN=$(node scripts/mint-testnut.js --no-dleq 8 2>/tmp/mint-d3.log)
          if [ -z "$TOKEN" ]; then echo "FAIL: Could not mint token"; exit 1; fi
          echo "Minted: ${TOKEN:0:40}..."

          timeout 15 ssh -o StrictHostKeyChecking=accept-new -o UserKnownHostsFile=/dev/null \
            -p 2222 "${TOKEN}@nodns.shop" 2>&1 | tee /tmp/delegated-d3.log || true

          grep -q "CASHU TOLLGATE" /tmp/delegated-d3.log || { echo "FAIL: SSH delegated auth did not show CASHU TOLLGATE banner"; exit 1; }
          grep -q "User:" /tmp/delegated-d3.log || { echo "FAIL: SSH delegated auth did not create guest user"; exit 1; }
          echo "SUCCESS: Delegated SSH auth works (banner + guest user created)"

