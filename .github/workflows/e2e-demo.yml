name: E2E Demo

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build & Vet
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Vet
        run: go vet ./...

      - name: Build SSH binary
        run: CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -o /tmp/tollgate-auth-ssh ./cmd/tollgate-auth-ssh/

      - name: Build RADIUS binary
        run: CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -o /tmp/tollgate-auth-radius ./cmd/tollgate-auth-radius/

  e2e-radius:
    name: Live RADIUS E2E
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - uses: actions/checkout@v4

      - name: Install RADIUS tools
        run: sudo apt-get update -qq && sudo apt-get install -y -qq freeradius-utils

      # Test 1: Fresh lnurlw → Accept + Reply-Message
      - name: Test 1 — Fresh lnurlw → Accept with Reply-Message
        run: |
          set +e
          echo 'User-Name = "lnurlw1cifresh1111kx2ar0veekzar0wd5xjtnrdakj7ci"
          User-Password = "anything"
          NAS-IP-Address = 10.0.0.1
          Calling-Station-Id = "aa-00-11-22-33-44"
          NAS-Port = 0' | radclient -x nodns.shop auth tollgate 2>&1 | tee /tmp/test1.log
          grep -q "Access-Accept" /tmp/test1.log
          grep -q "Reply-Message" /tmp/test1.log
          echo "--- Reply-Message:"
          grep "Reply-Message" /tmp/test1.log || true

      # Test 2: Replay same code with different MAC → Reject
      - name: Test 2 — Replay same code (different MAC) → Reject
        run: |
          set +e
          echo 'User-Name = "lnurlw1cifresh1111kx2ar0veekzar0wd5xjtnrdakj7ci"
          User-Password = "anything"
          NAS-IP-Address = 10.0.0.1
          Calling-Station-Id = "bb-00-22-33-44-55"
          NAS-Port = 0' | radclient -x nodns.shop auth tollgate 2>&1 | tee /tmp/test2.log
          grep -q "Access-Reject" /tmp/test2.log
          echo "--- Reject reason:"
          grep "Reply-Message" /tmp/test2.log || true

      # Test 3: Same MAC, different code → Accept (session reconnection)
      - name: Test 3 — Same MAC, different code → Accept (reconnection)
        run: |
          set +e
          echo 'User-Name = "lnurlw1cidiffcode999kx2ar0veekzar0wd5xjtnrdakj7ci"
          User-Password = "anything"
          NAS-IP-Address = 10.0.0.1
          Calling-Station-Id = "aa-00-11-22-33-44"
          NAS-Port = 0' | radclient -x nodns.shop auth tollgate 2>&1 | tee /tmp/test3.log
          grep -q "Access-Accept" /tmp/test3.log
          echo "--- Reply-Message:"
          grep "Reply-Message" /tmp/test3.log || true

      # Test 4: lnurlw in password field → Accept
      - name: Test 4 — lnurlw in password field → Accept
        run: |
          set +e
          echo 'User-Name = "ci-user"
          User-Password = "lnurlw1cipassfield7kx2ar0veekzar0wd5xjtnrdakj7ci"
          NAS-IP-Address = 10.0.0.1
          Calling-Station-Id = "cc-00-33-44-55-66"
          NAS-Port = 0' | radclient -x nodns.shop auth tollgate 2>&1 | tee /tmp/test4.log
          grep -q "Access-Accept" /tmp/test4.log

      # Test 5: Uppercase LNURLW → Accept
      - name: Test 5 — Uppercase LNURLW → Accept
        run: |
          set +e
          echo 'User-Name = "LNURLW1CIUPPERCASE7KX2AR0VEEKZAR0WD5XJTNRDAKJ7CI"
          User-Password = "anything"
          NAS-IP-Address = 10.0.0.1
          Calling-Station-Id = "dd-00-44-55-66-77"
          NAS-Port = 0' | radclient -x nodns.shop auth tollgate 2>&1 | tee /tmp/test5.log
          grep -q "Access-Accept" /tmp/test5.log

      # Test 6: Invalid credentials → Reject
      - name: Test 6 — Invalid credentials → Reject
        run: |
          set +e
          echo 'User-Name = "not-a-token"
          User-Password = "bad-password"
          NAS-IP-Address = 10.0.0.1
          Calling-Station-Id = "ee-00-55-66-77-88"
          NAS-Port = 0' | radclient -x nodns.shop auth tollgate 2>&1 | tee /tmp/test6.log
          grep -q "Access-Reject" /tmp/test6.log

      # Test 7: Cashu token — mint a fresh testnut token and authenticate
      - name: Test 7 — Cashu token (minted in CI) → Accept
        run: |
          set +e

          # Install cdk-cli — resolve the versioned binary name from GitHub API
          CDK_URL=$(curl -sL https://api.github.com/repos/cashubtc/cdk/releases/latest \
            | grep "browser_download_url.*cdk-cli.*x86_64" \
            | head -1 | cut -d'"' -f4)
          echo "Downloading cdk-cli from: $CDK_URL"
          curl -sL -o /tmp/cdk-cli "$CDK_URL"
          chmod +x /tmp/cdk-cli
          /tmp/cdk-cli --version || { echo "WARN: cdk-cli failed to run, skipping Cashu test"; exit 0; }

          # Create a temporary wallet
          WALLET_DIR=$(mktemp -d)

          # Request mint quote (testnut auto-pays)
          echo "--- Requesting mint quote from testnut.cashu.space ---"
          QUOTE_OUTPUT=$(/tmp/cdk-cli --work-dir "$WALLET_DIR" mint-quote --mint-url https://testnut.cashu.space --amount 8 2>&1)
          echo "Quote output: $QUOTE_OUTPUT"

          QUOTE_ID=$(echo "$QUOTE_OUTPUT" | grep -oP '(?<="id":")[^"]+' | head -1)
          if [ -z "$QUOTE_ID" ]; then
            QUOTE_ID=$(echo "$QUOTE_OUTPUT" | grep -oP '(?<=quote: )[^\s]+' | head -1)
          fi
          echo "Quote ID: $QUOTE_ID"

          if [ -z "$QUOTE_ID" ]; then
            echo "WARN: Could not get mint quote from testnut (API may be down), skipping Cashu test"
            rm -rf "$WALLET_DIR"
            exit 0
          fi

          # Wait for payment (testnut pays automatically)
          sleep 8

          # Mint proofs
          MINT_OUTPUT=$(/tmp/cdk-cli --work-dir "$WALLET_DIR" mint --mint-url https://testnut.cashu.space --quote-id "$QUOTE_ID" --amount 8 2>&1)
          echo "Mint output: $MINT_OUTPUT"

          # Send (swap) to get a token
          SEND_OUTPUT=$(/tmp/cdk-cli --work-dir "$WALLET_DIR" send --mint-url https://testnut.cashu.space --amount 8 2>&1)
          echo "Send output: $SEND_OUTPUT"
          TOKEN=$(echo "$SEND_OUTPUT" | grep -oP 'cashu[A|B][^\s]+' | head -1)
          echo "Token: ${TOKEN:0:40}..."

          if [ -z "$TOKEN" ]; then
            echo "WARN: Failed to mint Cashu token (testnut may be flaky), skipping test"
            rm -rf "$WALLET_DIR"
            exit 0
          fi

          # Send token as RADIUS auth (token in password field via TTLS+PAP style)
          echo "User-Name = \"ci-cashu-user\"
          User-Password = \"$TOKEN\"
          NAS-IP-Address = 10.0.0.1
          Calling-Station-Id = \"ff-00-66-77-88-99\"
          NAS-Port = 0" | radclient -x nodns.shop auth tollgate 2>&1 | tee /tmp/test7.log
          grep -q "Access-Accept" /tmp/test7.log
          echo "--- Reply-Message:"
          grep "Reply-Message" /tmp/test7.log || true

          # Cleanup
          rm -rf "$WALLET_DIR"

      # Test 8: SSH tollgate is listening on port 2222
      - name: Test 8 — SSH tollgate responds on port 2222
        run: |
          timeout 5 bash -c 'echo | nc nodns.shop 2222' 2>/dev/null | head -1 | grep -q "SSH"
