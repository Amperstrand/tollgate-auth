name: E2E Demo

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build & Vet
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Vet
        run: go vet ./...

      - name: Build SSH binary
        run: CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -o /tmp/tollgate-auth-ssh ./cmd/tollgate-auth-ssh/

      - name: Build RADIUS binary
        run: CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -o /tmp/tollgate-auth-radius ./cmd/tollgate-auth-radius/

  e2e-radius:
    name: Live RADIUS E2E
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Install tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq freeradius-utils socat

      # ─── Test 1: Fresh lnurlw → Accept + Reply-Message ───
      - name: Test 1 — Fresh lnurlw → Accept with Reply-Message
        run: |
          echo 'User-Name = "lnurlw1cifresh1111kx2ar0veekzar0wd5xjtnrdakj7ci"
          User-Password = "anything"
          NAS-IP-Address = 10.0.0.1
          Calling-Station-Id = "aa-00-11-22-33-44"
          NAS-Port = 0' | radclient -x nodns.shop auth tollgate 2>&1 | tee /tmp/test1.log
          grep -q "Access-Accept" /tmp/test1.log || { echo "FAIL: Expected Access-Accept"; exit 1; }
          grep -q "Reply-Message" /tmp/test1.log || { echo "FAIL: Expected Reply-Message"; exit 1; }
          echo "Reply-Message: $(grep Reply-Message /tmp/test1.log)"

      # ─── Test 2: Replay same code with different MAC → Reject ───
      - name: Test 2 — Replay same code (different MAC) → Reject
        run: |
          echo 'User-Name = "lnurlw1cifresh1111kx2ar0veekzar0wd5xjtnrdakj7ci"
          User-Password = "anything"
          NAS-IP-Address = 10.0.0.1
          Calling-Station-Id = "bb-00-22-33-44-55"
          NAS-Port = 0' | radclient -x nodns.shop auth tollgate 2>&1 | tee /tmp/test2.log
          grep -q "Access-Reject" /tmp/test2.log || { echo "FAIL: Expected Access-Reject for replay"; exit 1; }

      # ─── Test 3: Same MAC, different code → Accept (session reconnection) ───
      - name: Test 3 — Same MAC, different code → Accept (reconnection)
        run: |
          echo 'User-Name = "lnurlw1cidiffcode999kx2ar0veekzar0wd5xjtnrdakj7ci"
          User-Password = "anything"
          NAS-IP-Address = 10.0.0.1
          Calling-Station-Id = "aa-00-11-22-33-44"
          NAS-Port = 0' | radclient -x nodns.shop auth tollgate 2>&1 | tee /tmp/test3.log
          grep -q "Access-Accept" /tmp/test3.log || { echo "FAIL: Expected Access-Accept for reconnection"; exit 1; }

      # ─── Test 4: lnurlw in password field → Accept ───
      - name: Test 4 — lnurlw in password field → Accept
        run: |
          echo 'User-Name = "ci-user"
          User-Password = "lnurlw1cipassfield7kx2ar0veekzar0wd5xjtnrdakj7ci"
          NAS-IP-Address = 10.0.0.1
          Calling-Station-Id = "cc-00-33-44-55-66"
          NAS-Port = 0' | radclient -x nodns.shop auth tollgate 2>&1 | tee /tmp/test4.log
          grep -q "Access-Accept" /tmp/test4.log || { echo "FAIL: Expected Access-Accept for lnurlw in password"; exit 1; }

      # ─── Test 5: Uppercase LNURLW → Accept ───
      - name: Test 5 — Uppercase LNURLW → Accept
        run: |
          echo 'User-Name = "LNURLW1CIUPPERCASE7KX2AR0VEEKZAR0WD5XJTNRDAKJ7CI"
          User-Password = "anything"
          NAS-IP-Address = 10.0.0.1
          Calling-Station-Id = "dd-00-44-55-66-77"
          NAS-Port = 0' | radclient -x nodns.shop auth tollgate 2>&1 | tee /tmp/test5.log
          grep -q "Access-Accept" /tmp/test5.log || { echo "FAIL: Expected Access-Accept for uppercase LNURLW"; exit 1; }

      # ─── Test 6: Invalid credentials → Reject ───
      - name: Test 6 — Invalid credentials → Reject
        run: |
          echo 'User-Name = "not-a-token"
          User-Password = "bad-password"
          NAS-IP-Address = 10.0.0.1
          Calling-Station-Id = "ee-00-55-66-77-88"
          NAS-Port = 0' | radclient -x nodns.shop auth tollgate 2>&1 | tee /tmp/test6.log
          grep -q "Access-Reject" /tmp/test6.log || { echo "FAIL: Expected Access-Reject for invalid creds"; exit 1; }

      - name: Cache eapol_test binary
        id: cache-eapol
        uses: actions/cache@v4
        with:
          path: /usr/local/bin/eapol_test
          key: eapol-test-ubuntu2404-v1

      - name: Build eapol_test (cache miss)
        if: steps.cache-eapol.outputs.cache-hit != 'true'
        run: |
          sudo sed -i '/^Types:/s/deb$/deb deb-src/' /etc/apt/sources.list.d/ubuntu.sources 2>/dev/null || true
          sudo apt-get update -qq 2>/dev/null
          sudo apt-get build-dep -y -qq wpasupplicant 2>/dev/null || \
            sudo apt-get install -y -qq libssl-dev libnl-3-dev libnl-genl-3-dev pkg-config libdbus-1-dev 2>/dev/null
          mkdir -p /tmp/eapol-build && cd /tmp/eapol-build
          apt-get source --quiet wpasupplicant 2>/dev/null
          cd wpa-*/wpa_supplicant
          cp defconfig .config
          echo "CONFIG_EAPOL_TEST=y" >> .config
          echo "CFLAGS += -Wno-deprecated-declarations" >> .config
          make -j$(nproc) eapol_test 2>&1 | tail -10
          sudo cp eapol_test /usr/local/bin/

      - name: Cache npm deps
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: npm-cashu-ts-${{ hashFiles('scripts/mint-testnut.js') }}
          restore-keys: npm-cashu-ts-

      - name: Resolve RADIUS server IP
        run: echo "RADIUS_IP=$(dig +short nodns.shop A | head -1)" >> "$GITHUB_ENV"

      - name: Install npm deps
        run: npm install --no-package-lock @cashu/cashu-ts@4.5.1 2>&1 | tail -1

      # ─── Test 7: Cashu token via EAP-TTLS+PAP (no-DLEQ, password-only) → Access-Accept ───
      # No-DLEQ tokens are 230 bytes — fits in a single RADIUS attribute (under 253-byte limit).
      # Token goes entirely in the password field. This is the simplest and most practical mode.
      - name: Test 7 — Cashu no-DLEQ token in password → Access-Accept
        run: |
          echo "eapol_test: $(which eapol_test)"

          TOKEN=$(node scripts/mint-testnut.js --no-dleq --write-eapol-config /tmp/eapol7.conf 2>/tmp/mint7.log)
          if [ -z "$TOKEN" ]; then
            echo "FAIL: Could not mint Cashu token"
            cat /tmp/mint7.log
            exit 1
          fi
          echo "Minted: ${TOKEN:0:40}... (${#TOKEN} bytes)"

          # Verify token fits in single field
          if [ ${#TOKEN} -gt 253 ]; then
            echo "FAIL: No-DLEQ token is ${#TOKEN} bytes, expected <= 253"
            exit 1
          fi

          echo "--- EAP-TTLS+PAP (password-only) against ${RADIUS_IP}:1812 ---"
          eapol_test -c /tmp/eapol7.conf -a "$RADIUS_IP" -s tollgate \
            -M ff:00:77:88:99:aa -r 1 -t 30 2>&1 | tee /tmp/eapol7.log

          grep -q "Access-Accept" /tmp/eapol7.log || { echo "FAIL: Expected Access-Accept for no-DLEQ token in password"; cat /tmp/eapol7.log; exit 1; }
          echo "SUCCESS: No-DLEQ Cashu token (password-only) validated via EAP-TTLS+PAP"

      # ─── Test 8: Cashu no-DLEQ token in username/identity → Access-Accept ───
      # Same 230-byte no-DLEQ token, but in the identity (username) field instead of password.
      # Tests the "token in username" path in extractPayment().
      - name: Test 8 — Cashu no-DLEQ token in username → Access-Accept
        run: |
          TOKEN=$(node scripts/mint-testnut.js --no-dleq --token-in-username --write-eapol-config /tmp/eapol8.conf 2>/tmp/mint8.log)
          if [ -z "$TOKEN" ]; then
            echo "FAIL: Could not mint Cashu token"
            cat /tmp/mint8.log
            exit 1
          fi
          echo "Minted: ${TOKEN:0:40}... (${#TOKEN} bytes)"

          echo "--- EAP-TTLS+PAP (identity-only) against ${RADIUS_IP}:1812 ---"
          eapol_test -c /tmp/eapol8.conf -a "$RADIUS_IP" -s tollgate \
            -M ff:33:aa:bb:cc:dd -r 1 -t 30 2>&1 | tee /tmp/eapol8.log

          grep -q "Access-Accept" /tmp/eapol8.log || { echo "FAIL: Expected Access-Accept for no-DLEQ token in username"; cat /tmp/eapol8.log; exit 1; }
          echo "SUCCESS: No-DLEQ Cashu token (identity-only) validated via EAP-TTLS+PAP"

      # ─── Test 9: Cashu split token via EAP-TTLS+PAP → Access-Accept ───
      # Full 378-byte token with DLEQ proof exceeds 253-byte limit.
      # Split at byte 200: password gets first 200b (with cashuB prefix), identity gets 178b tail.
      # Go binary detects and reassembles. Tests the split-token fallback path.
      - name: Test 9 — Cashu split token (with DLEQ) → Access-Accept
        run: |
          TOKEN=$(node scripts/mint-testnut.js --write-eapol-config /tmp/eapol9.conf --eap-identity ci-split-user 2>/tmp/mint9.log)
          if [ -z "$TOKEN" ]; then
            echo "FAIL: Could not mint Cashu token"
            cat /tmp/mint9.log
            exit 1
          fi
          echo "Minted: ${TOKEN:0:40}... (${#TOKEN} bytes)"

          # Verify this is a full DLEQ token (should be > 253)
          if [ ${#TOKEN} -le 253 ]; then
            echo "FAIL: Expected full DLEQ token > 253 bytes, got ${#TOKEN}"
            exit 1
          fi

          echo "--- EAP-TTLS+PAP (split) against ${RADIUS_IP}:1812 ---"
          eapol_test -c /tmp/eapol9.conf -a "$RADIUS_IP" -s tollgate \
            -M ff:44:bb:cc:dd:ee -r 1 -t 30 2>&1 | tee /tmp/eapol9.log

          grep -q "Access-Accept" /tmp/eapol9.log || { echo "FAIL: Expected Access-Accept for split Cashu token"; cat /tmp/eapol9.log; exit 1; }
          echo "SUCCESS: Split Cashu token (with DLEQ) validated via EAP-TTLS+PAP"

      # ─── Test 10: Cashu token replay → Accept then Reject ───
      # Verifies replay protection: same no-DLEQ token used twice = second attempt rejected.
      # Uses a DIFFERENT MAC for the replay to avoid session-reconnection path.
      - name: Test 10 — Cashu no-DLEQ token replay → Accept then Reject
        run: |
          TOKEN=$(node scripts/mint-testnut.js --no-dleq --write-eapol-config /tmp/eapol10a.conf 2>/tmp/mint10.log)
          if [ -z "$TOKEN" ]; then
            echo "FAIL: Could not mint Cashu token"
            cat /tmp/mint10.log
            exit 1
          fi
          echo "Minted: ${TOKEN:0:40}... (${#TOKEN} bytes)"

          echo "--- First use (expect Accept) ---"
          eapol_test -c /tmp/eapol10a.conf -a "$RADIUS_IP" -s tollgate \
            -M ff:55:cc:dd:ee:f0 -r 1 -t 30 2>&1 | tee /tmp/eapol10a.log
          grep -q "Access-Accept" /tmp/eapol10a.log || { echo "FAIL: First use should Accept"; exit 1; }

          node scripts/mint-testnut.js --token "$TOKEN" --write-eapol-config /tmp/eapol10b.conf

          echo "--- Replay (expect Reject) ---"
          eapol_test -c /tmp/eapol10b.conf -a "$RADIUS_IP" -s tollgate \
            -M ff:66:dd:ee:ff:00 -r 1 -t 30 2>&1 | tee /tmp/eapol10b.log
          grep -q "Access-Reject" /tmp/eapol10b.log || { echo "FAIL: Replay should Reject"; exit 1; }
          echo "SUCCESS: Replay protection working"

      # ─── Test 11: RadSec (RADIUS over TLS on port 2083) ───
      - name: Test 11 — RadSec (TLS on port 2083) → Accept
        run: |
          # Create local TLS tunnel to RadSec port
          socat TCP-LISTEN:11812,reuseaddr,fork SSL:nodns.shop:2083,verify=0 &
          SOCAT_PID=$!
          sleep 1

          echo 'User-Name = "lnurlw1ciradsectest7kx2ar0veekzar0wd5xjtnrdakj7ci"
          User-Password = "anything"
          NAS-IP-Address = 10.0.0.1
          Calling-Station-Id = "ff-44-66-77-88-99"
          NAS-Port = 0' | radclient -x -P tcp -r 1 -t 5 127.0.0.1:11812 auth radsec 2>&1 | tee /tmp/test11.log

          kill $SOCAT_PID 2>/dev/null

          grep -q "Access-Accept" /tmp/test11.log || { echo "FAIL: Expected Access-Accept via RadSec"; exit 1; }
          echo "SUCCESS: RadSec accepted"

      # ─── Test 12: SSH tollgate responds on port 2222 ───
      - name: Test 12 — SSH tollgate responds on port 2222
        run: |
          timeout 5 bash -c 'echo | nc nodns.shop 2222' 2>/dev/null | head -1 | grep -q "SSH" \
            || { echo "FAIL: SSH tollgate not responding on port 2222"; exit 1; }

      # ─── Test 13: Session-Timeout accuracy (parse value from Accept) ───
      # Verifies Session-Timeout = amount × RateSecPerSat.
      # Uses a fresh lnurlw (3600s default) and checks the returned value.
      - name: Test 13 — Session-Timeout accuracy
        run: |
          echo 'User-Name = "lnurlw1citimeouttest7kx2ar0veekzar0wd5xjtnrdakj7ci"
          User-Password = "anything"
          NAS-IP-Address = 10.0.0.1
          Calling-Station-Id = "aa:bb:cc:dd:ee:13"
          NAS-Port = 0' | radclient -x nodns.shop auth tollgate 2>&1 | tee /tmp/test13.log
          grep -q "Access-Accept" /tmp/test13.log || { echo "FAIL: Expected Access-Accept"; exit 1; }
          # Extract Session-Timeout value
          ST=$(grep "Session-Timeout" /tmp/test13.log | grep -oE '[0-9]+' | head -1)
          if [ -z "$ST" ]; then
            echo "FAIL: No Session-Timeout in response"
            exit 1
          fi
          echo "Session-Timeout = $ST"
          # LNURLW default is 3600s
          if [ "$ST" -ne 3600 ]; then
            echo "FAIL: Expected Session-Timeout=3600 (LNURLW default), got $ST"
            exit 1
          fi
          echo "SUCCESS: Session-Timeout is correct ($ST)"

      # ─── Test 14: Session-Timeout for Cashu token scales with amount ───
      # Mints a 5-sat token → expects Session-Timeout = 5 × 60 = 300.
      - name: Test 14 — Cashu token Session-Timeout scales with amount
        run: |
          TOKEN=$(node scripts/mint-testnut.js --no-dleq 5 2>/tmp/mint14.log)
          if [ -z "$TOKEN" ]; then
            echo "FAIL: Could not mint Cashu token"
            cat /tmp/mint14.log
            exit 1
          fi
          echo "Minted 5-sat token (${#TOKEN} bytes)"

          node scripts/mint-testnut.js --token "$TOKEN" --write-eapol-config /tmp/eapol14.conf

          eapol_test -c /tmp/eapol14.conf -a "$RADIUS_IP" -s tollgate \
            -M ff:14:aa:bb:cc:dd -r 1 -t 30 2>&1 | tee /tmp/eapol14.log

          grep -q "Access-Accept" /tmp/eapol14.log || { echo "FAIL: Expected Access-Accept"; cat /tmp/eapol14.log; exit 1; }
          ST=$(grep "Session-Timeout" /tmp/eapol14.log | grep -oE '[0-9]+' | head -1)
          if [ -z "$ST" ]; then
            echo "FAIL: No Session-Timeout in response"
            exit 1
          fi
          echo "Session-Timeout = $ST (expected 300 for 5 sat)"
          if [ "$ST" -ne 300 ]; then
            echo "FAIL: Expected Session-Timeout=300 (5×60), got $ST"
            exit 1
          fi
          echo "SUCCESS: Session-Timeout scales correctly (5 sat → $ST)"

      # ─── Test 15: RADIUS accounting (Acct-Start + Acct-Stop) ───
      # Sends accounting start and stop packets to port 1813.
      # FreeRADIUS should acknowledge both without error.
      - name: Test 15 — RADIUS accounting (Start + Stop)
        run: |
          # Acct-Status-Type 1 = Start
          echo 'Acct-Status-Type = Start
          User-Name = "ci-acct-user"
          NAS-IP-Address = 10.0.0.1
          Calling-Station-Id = "aa:bb:cc:dd:ee:15"
          Acct-Session-Id = "ci-session-001"
          NAS-Port = 0' | radclient -x nodns.shop acct tollgate 2>&1 | tee /tmp/acct-start.log
          grep -q "Accounting-Response" /tmp/acct-start.log || { echo "FAIL: No Accounting-Response for Start"; exit 1; }
          echo "Acct-Start: OK"

          # Acct-Status-Type 2 = Stop
          echo 'Acct-Status-Type = Stop
          User-Name = "ci-acct-user"
          NAS-IP-Address = 10.0.0.1
          Calling-Station-Id = "aa:bb:cc:dd:ee:15"
          Acct-Session-Id = "ci-session-001"
          Acct-Session-Time = 300
          Acct-Input-Octets = 1024
          Acct-Output-Octets = 2048
          NAS-Port = 0' | radclient -x nodns.shop acct tollgate 2>&1 | tee /tmp/acct-stop.log
          grep -q "Accounting-Response" /tmp/acct-stop.log || { echo "FAIL: No Accounting-Response for Stop"; exit 1; }
          echo "Acct-Stop: OK"
          echo "SUCCESS: Accounting Start + Stop both acknowledged"

      # ─── Test 16: Concurrent sessions (parallel auth with different MACs) ───
      # Two independent auth requests in parallel — both must succeed.
      - name: Test 16 — Concurrent sessions (parallel auth)
        run: |
          # Fire two lnurlw auth requests in parallel with different MACs
          echo 'User-Name = "lnurlw1ciconcurrent1akx2ar0veekzar0wd5xjtnrdakj7ci"
          User-Password = "anything"
          NAS-IP-Address = 10.0.0.1
          Calling-Station-Id = "aa:bb:cc:dd:ee:16"
          NAS-Port = 0' | radclient -x -r 1 -t 10 nodns.shop auth tollgate > /tmp/conc1.log 2>&1 &

          echo 'User-Name = "lnurlw1ciconcurrent2bkx2ar0veekzar0wd5xjtnrdakj7ci"
          User-Password = "anything"
          NAS-IP-Address = 10.0.0.1
          Calling-Station-Id = "aa:bb:cc:dd:ee:17"
          NAS-Port = 0' | radclient -x -r 1 -t 10 nodns.shop auth tollgate > /tmp/conc2.log 2>&1 &

          wait
          echo "--- Concurrent session 1 ---"
          cat /tmp/conc1.log
          echo "--- Concurrent session 2 ---"
          cat /tmp/conc2.log

          grep -q "Access-Accept" /tmp/conc1.log || { echo "FAIL: Concurrent session 1 not accepted"; exit 1; }
          grep -q "Access-Accept" /tmp/conc2.log || { echo "FAIL: Concurrent session 2 not accepted"; exit 1; }
          echo "SUCCESS: Both concurrent sessions accepted"
