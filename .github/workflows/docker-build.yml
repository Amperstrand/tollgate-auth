# .github/workflows/docker-build.yml — build Docker images for regression catching.
#
# Currently set to BUILD ONLY (no publish). All images are built on every
# push to verify Dockerfiles compile cleanly. To enable publishing to GHCR,
# set PUSH_TO_GHCR to "true" below and ensure the repo has packages:write
# permission. We're holding off on publishing until we decide if GHCR adds
# enough value for this project (see docs/SECURITY_AUDIT_WINDOW3.md).

name: docker-build

on:
  push:
    branches: [main]
    paths:
      - 'docker/**'
      - 'cmd/**'
      - 'internal/**'
      - '.dockerignore'
      - '.github/workflows/docker-build.yml'
  pull_request:
    paths:
      - 'docker/**'
      - 'cmd/**'
      - 'internal/**'
      - '.dockerignore'

env:
  PUSH_TO_GHCR: "false"

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - tollgate-auth-ocpi
          - tollgate-csms
          - tollgate-webssh
          - tollgate-daemon
          - tollgate-settle
          - freeradius
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: env.PUSH_TO_GHCR == 'true' && github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build image (verify Dockerfile compiles)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/${{ matrix.service }}/Dockerfile
          platforms: linux/amd64
          push: false
          tags: ${{ matrix.service }}:ci-verify
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}

      - name: Report status
        if: always()
        run: |
          echo "### Docker build: ${{ matrix.service }}" >> $GITHUB_STEP_SUMMARY
          echo "Status: ${{ job.status }}" >> $GITHUB_STEP_SUMMARY

  summary:
    needs: build
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Aggregate
        run: |
          if [ "${{ needs.build.result }}" != "success" ]; then
            echo "FAIL: at least one image failed to build"
            exit 1
          fi
          echo "All Docker images built successfully."

  scan:
    needs: build
    runs-on: ubuntu-latest
    if: always() && needs.build.result == 'success'
    strategy:
      matrix:
        service:
          - tollgate-auth-ocpi
          - tollgate-csms
          - tollgate-webssh
          - tollgate-daemon
          - tollgate-settle
          - freeradius
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build image for scanning
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/${{ matrix.service }}/Dockerfile
          platforms: linux/amd64
          push: false
          tags: ${{ matrix.service }}:scan
          load: true
          cache-from: type=gha,scope=${{ matrix.service }}

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ matrix.service }}:scan
          format: table
          exit-code: '0'
          ignore-unfixed: true
          vuln-type: os,library
          severity: CRITICAL,HIGH
          output: trivy-${{ matrix.service }}.txt

      - name: Upload scan results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-scan-${{ matrix.service }}
          path: trivy-${{ matrix.service }}.txt

      - name: Report
        if: always()
        run: |
          echo "### Trivy scan: ${{ matrix.service }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "exit-code=0 means CRITICAL/HIGH findings are reported but do not fail the build." >> $GITHUB_STEP_SUMMARY
          echo "Set exit-code to 1 to enforce blocking once the baseline is clean." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          cat trivy-${{ matrix.service }}.txt >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
